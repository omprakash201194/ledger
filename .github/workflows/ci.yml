name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: compile + test ──────────────────────────────────────────────────
  backend:
    name: Backend (Java 21 / Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Run tests
        run: mvn -f backend/pom.xml test -B


  # ── Frontend: lint + build ───────────────────────────────────────────────────
  frontend:
    name: Frontend (Node 20 / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Type-check + build
        run: npm run build --prefix frontend


  # ── Deploy: build images + push + kubectl ────────────────────────────────────
  # Runs on a self-hosted runner registered on the homelab server.
  # The runner has direct access to the insecure Docker registry at
  # localhost:30500 and a valid kubeconfig pointing at the k3s cluster.
  #
  # To register a runner:
  #   1. Go to https://github.com/omprakash201194/ledger/settings/actions/runners
  #   2. Click "New self-hosted runner" → Linux → follow the instructions
  #   3. Start the runner as a systemd service so it survives reboots
  deploy:
    name: Deploy to Homelab
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      REGISTRY: localhost:30500
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Build & push backend image
        run: |
          docker build \
            -t $REGISTRY/homelab/ledger-backend:$IMAGE_TAG \
            -t $REGISTRY/homelab/ledger-backend:latest \
            backend/
          docker push $REGISTRY/homelab/ledger-backend:$IMAGE_TAG
          docker push $REGISTRY/homelab/ledger-backend:latest

      - name: Build & push frontend image
        run: |
          docker build \
            -t $REGISTRY/homelab/ledger-frontend:$IMAGE_TAG \
            -t $REGISTRY/homelab/ledger-frontend:latest \
            frontend/
          docker push $REGISTRY/homelab/ledger-frontend:$IMAGE_TAG
          docker push $REGISTRY/homelab/ledger-frontend:latest

      - name: Roll out new images
        run: |
          kubectl apply -f k8s/ -n homelab
          kubectl set image deployment/ledger-backend \
            ledger-backend=$REGISTRY/homelab/ledger-backend:$IMAGE_TAG \
            -n homelab
          kubectl set image deployment/ledger-frontend \
            ledger-frontend=$REGISTRY/homelab/ledger-frontend:$IMAGE_TAG \
            -n homelab
          kubectl rollout status deployment/ledger-backend -n homelab --timeout=600s
          kubectl rollout status deployment/ledger-frontend -n homelab --timeout=90s

server:
  # Trust X-Forwarded-Proto from Cloudflare/nginx so Spring generates https:// URLs
  forward-headers-strategy: native

spring:
  application:
    name: ledger-backend
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "https://ledger.onelifestack.com/api/login/oauth2/code/google"
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${APP_JWT_SECRET}
    expiration-ms: 86400000  # 24 hours
  oauth2:
    frontend-redirect-url: ${FRONTEND_URL:https://ledger.homelab.local}/oauth2/callback
  mail:
    from: ${GMAIL_USERNAME}
  frontend-url: ${FRONTEND_URL:https://ledger.homelab.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    mail:
      enabled: false
